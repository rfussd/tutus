name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install mypy
        run: pip install mypy
      - name: Mypy check
        run: mypy . --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install tools
        run: pip install pip-audit bandit
      - name: pip-audit (dependency CVEs)
        run: |
          pip-audit \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln CVE-2024-28397
      - name: Bandit (static analysis)
        run: bandit -r . -x tests,data,.mypy_cache,.pytest_cache,__pycache__,training --severity-level high

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock requests pydantic python-dotenv tinydb
      - name: Install project (no deps)
        run: pip install -e . --no-deps
      - name: Run tests
        run: pytest -v --tb=short -x --cov=core --cov=agents --cov=skills --cov=ui --cov=web --cov-report=term:skip-covered

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
