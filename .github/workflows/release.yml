name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name tutus `
            --add-data "ui;ui" --add-data "core;core" --add-data "agents;agents" `
            --add-data "skills;skills" --add-data "web;web" --add-data "assets;assets" `
            --hidden-import PyQt6.QtSvg --hidden-import PyQt6.QtMultimedia `
            main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tutus-windows-x64
          path: dist/tutus.exe

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-exe, publish-pypi]
    steps:
      - uses: actions/checkout@v4
      - name: Download exe
        uses: actions/download-artifact@v4
        with:
          name: tutus-windows-x64
          path: dist/
      - name: Generate release notes
        run: |
          awk '/^## /{if(c++) exit} //' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ github.ref_name }}" > release-notes.md
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/tutus.exe
          generate_release_notes: false
