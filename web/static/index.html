<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TUTUS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #020814;
  --surface: rgba(0,20,40,0.85);
  --border: rgba(0,200,255,0.15);
  --accent: #00dcff;
  --accent2: #00ff96;
  --text: rgba(200,235,255,0.9);
  --text-dim: rgba(0,180,255,0.5);
  --radius: 12px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold; font-size: 14px;
  color: var(--bg);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 8px var(--accent); }
  50% { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,220,255,0.3); }
}
.logo-text {
  font-weight: 700; font-size: 18px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.status {
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px;
}
.status.online { color: var(--accent2); }
.status.thinking { color: #ffb400; }
.status.idle { color: var(--text-dim); }

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scroll-behavior: smooth;
}
.chat-container::-webkit-scrollbar { width: 3px; }
.chat-container::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.message {
  margin-bottom: 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-user, .msg-tutus {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}
.msg-user { justify-content: flex-end; }
.msg-label {
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.msg-label.user { color: rgba(180,200,255,0.6); text-align: right; }
.msg-label.tutus { color: var(--accent); }
.msg-bubble {
  max-width: 92%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
  overflow-wrap: break-word;
}
.msg-user .msg-bubble {
  background: rgba(0,150,255,0.12);
  border: 1px solid rgba(0,180,255,0.2);
  border-bottom-right-radius: 4px;
}
.msg-tutus .msg-bubble {
  background: rgba(0,20,40,0.6);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-bubble code {
  background: rgba(0,180,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
.msg-bubble pre {
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid rgba(0,200,255,0.1);
}
.msg-bubble pre code {
  background: none;
  padding: 0;
  font-size: 13px;
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 16px;
  background: var(--accent);
  animation: blink 0.8s infinite;
  margin-left: 2px;
  vertical-align: middle;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* Input area */
.input-container {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.input-row {
  display: flex;
  gap: 8px;
}
.input-row input {
  flex: 1;
  background: rgba(0,150,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--text-dim); font-size: 13px; }
.input-row button {
  width: 44px; height: 44px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: rgba(0,180,255,0.08);
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.input-row button:hover { background: rgba(0,180,255,0.15); border-color: var(--accent); }
.input-row button:active { transform: scale(0.95); }
.input-row button.recording {
  background: rgba(255,50,50,0.2);
  border-color: rgba(255,80,80,0.5);
  color: #ff4444;
  animation: recPulse 1s infinite;
}
@keyframes recPulse { 0%,100% { box-shadow: 0 0 5px rgba(255,50,50,0.3); } 50% { box-shadow: 0 0 15px rgba(255,50,50,0.5); } }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Mobile responsive */
@media (max-width: 480px) {
  .header { padding: 10px 12px; }
  .logo-text { font-size: 15px; letter-spacing: 2px; }
  .chat-container { padding: 12px; }
  .msg-bubble { max-width: 90%; font-size: 15px; }
  .input-container { padding: 10px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">T</div>
    <span class="logo-text">TUTUS</span>
  </div>
  <span class="status online" id="status">EN LINEA</span>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-container">
  <div class="input-row">
    <input type="text" id="input" placeholder="Escribe un mensaje..." autofocus>
    <button id="btnMic" title="Microfono">🎤</button>
    <button id="btnSend" title="Enviar">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btnSend = document.getElementById('btnSend');
const btnMic = document.getElementById('btnMic');
const statusEl = document.getElementById('status');

let ws = null;
let isThinking = false;
let mediaRecorder = null;
let audioChunks = [];

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => console.log('WS connected');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'user':
        addMessage('user', msg.text);
        break;
      case 'token':
        appendStreaming(msg.text);
        break;
      case 'done':
        finalizeStreaming(msg.text);
        isThinking = false;
        setStatus('online');
        enableInput(true);
        break;
      case 'error':
        addMessage('tutus', '⚠ Error: ' + msg.message);
        isThinking = false;
        setStatus('online');
        enableInput(true);
        break;
      case 'status':
        setStatus(msg.state);
        break;
      case 'info':
        addMessage('tutus', msg.data);
        break;
    }
  };

  ws.onclose = () => {
    console.log('WS closed, reconnecting...');
    setTimeout(connect, 2000);
  };

  ws.onerror = (e) => console.error('WS error', e);
}

let streamingDiv = null;
let streamingText = '';

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'message';

  if (role === 'user') {
    div.innerHTML = `
      <div class="msg-label user">▸ TU</div>
      <div class="msg-user">
        <div class="msg-bubble">${escapeHtml(text)}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-label tutus">◈ TUTUS</div>
      <div class="msg-tutus">
        <div class="msg-bubble">${renderMarkdown(text)}</div>
      </div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  streamingDiv = null;
  streamingText = '';
}

function appendStreaming(token) {
  if (!streamingDiv) {
    streamingDiv = document.createElement('div');
    streamingDiv.className = 'message';
    streamingDiv.innerHTML = `
      <div class="msg-label tutus">◈ TUTUS</div>
      <div class="msg-tutus">
        <div class="msg-bubble" id="streamBubble"></div>
      </div>`;
    chat.appendChild(streamingDiv);
    streamingText = '';
  }

  streamingText += token;
  const bubble = document.getElementById('streamBubble');
  if (bubble) {
    bubble.innerHTML = renderMarkdown(streamingText) + '<span class="cursor"></span>';
    chat.scrollTop = chat.scrollHeight;
  }
}

function finalizeStreaming(fullText) {
  if (streamingDiv) {
    const bubble = document.getElementById('streamBubble');
    if (bubble) bubble.innerHTML = renderMarkdown(fullText);
    streamingDiv = null;
    streamingText = '';
  } else {
    addMessage('tutus', fullText);
  }
}

function sendMessage(msg) {
  if (!msg || isThinking) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ text: msg }));
    isThinking = true;
    enableInput(false);
    setStatus('thinking');
  }
}

function enableInput(enabled) {
  input.disabled = !enabled;
  btnSend.disabled = !enabled;
  btnMic.disabled = !enabled;
  if (enabled) input.focus();
}

function setStatus(state) {
  statusEl.className = 'status ' + state;
  const labels = { online: 'EN LINEA', thinking: 'PENSANDO...', idle: 'ESPERANDO' };
  statusEl.textContent = labels[state] || state.toUpperCase();
}

// Events
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = input.value.trim();
    if (text) { input.value = ''; sendMessage(text); }
  }
});

btnSend.addEventListener('click', () => {
  const text = input.value.trim();
  if (text) { input.value = ''; sendMessage(text); }
});

btnMic.addEventListener('click', toggleMic);

// Speech Recognition (Web API)
let recognition = null;

function toggleMic() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
    return;
  }

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    startSpeechRecog();
  } else {
    // Fallback: record with MediaRecorder + whisper (send audio)
    startRecording();
  }
}

function startSpeechRecog() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'es-MX';
  recognition.interimResults = false;
  recognition.continuous = false;

  btnMic.classList.add('recording');
  btnMic.textContent = '⏹';

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    btnMic.classList.remove('recording');
    btnMic.textContent = '🎤';
    if (text.trim()) {
      input.value = text;
      sendMessage(text);
    }
  };

  recognition.onerror = () => {
    btnMic.classList.remove('recording');
    btnMic.textContent = '🎤';
  };

  recognition.onend = () => {
    btnMic.classList.remove('recording');
    btnMic.textContent = '🎤';
  };

  recognition.start();
}

// Audio recording fallback
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      btnMic.classList.remove('recording');
      btnMic.textContent = '🎤';
      // Would send to server for whisper processing
    };

    mediaRecorder.start();
    btnMic.classList.add('recording');
    btnMic.textContent = '⏹';

    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
    }, 5000);
  } catch (e) {
    console.error('Mic error:', e);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

// Connect on load
connect();
</script>
</body>
</html>
